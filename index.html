<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pralmyx (PMA)</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>
body {
  PRALMYX LOGO.png
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #1a001a, #000);
  color: white;
  text-align: center;
}

h1 {
  color: #ff4df0;
  font-size: 48px;
  text-shadow: 0 0 20px #ff4df0;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #ff4df0; }
  to { text-shadow: 0 0 25px #ff00aa; }
}

.top-bar {
  position: absolute;
  right: 20px;
  top: 20px;
}

.btn {
  background: linear-gradient(45deg, #ff4df0, #ff00aa);
  padding: 14px 28px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  margin: 10px;
  display: inline-block;
  transition: 0.3s;
  border: none;
  cursor: pointer;
}

.btn:hover {
  transform: scale(1.05);
}

.card {
  background: #111;
  margin: 20px auto;
  padding: 25px;
  border-radius: 15px;
  max-width: 1000px;
  box-shadow: 0 0 25px rgba(255,0,200,0.2);
}

iframe {
  width: 100%;
  height: 500px;
  border-radius: 12px;
  border: none;
}

.price-box {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 20px;
}

.stat {
  background: #15151d;
  padding: 15px 25px;
  border-radius: 10px;
}

footer {
  margin: 40px;
  color: gray;
}
</style>
</head>

<body>

<div class="top-bar">
  <button class="btn" onclick="connectWallet()">🔗 Connect Wallet</button>
</div>

<h1>🚀 PRALMYX (PMA)</h1>
<p>Decentralized token on BNB Chain</p>

<div class="price-box">
  <div class="stat">💰 Price: <span id="price">Loading...</span></div>
  <div class="stat">📊 Volume: <span id="volume">Loading...</span></div>
</div>

<a class="btn" href="https://pancakeswap.finance/swap?chain=bsc&outputCurrency=BNB&inputCurrency=0x557aA6EDC2b7808e8304A18c4Cf62B2e56620211">Buy PMA</a>

<div class="card">
  <h2>📈 Live Chart</h2>
  <iframe src="https://dexscreener.com/bsc/0x813f732fd927f2889ddd5d66103063c0166d9a0c?embed=1&theme=dark"></iframe>
</div>

<div class="card">
  <h2>📊 Token Info</h2>
  <p><b>Contract:</b><br>0x557aA6EDC2b7808e8304A18c4Cf62B2e56620211</p>
</div>

<div class="card">
  <h2>🌐 Community</h2>
  <a class="btn" href="https://discord.gg/c7R7yGJD">Discord</a>
  <a class="btn" href="https://www.reddit.com/user/pralmyx/">Reddit</a>
  <a class="btn" href="https://x.com/PralmyxD">X</a>
</div>

<footer>© 2026 Pralmyx</footer>

<script>
// WALLET REAL
async function connectWallet() {
  if (window.ethereum) {
    const accounts = await ethereum.request({ method: 'eth_requestAccounts' });
    alert("Connected: " + accounts[0]);
  } else {
    alert("Install MetaMask");
  }
}

// PRECIO REAL (Dexscreener API)
async function loadData() {
  try {
    let res = await fetch("https://api.dexscreener.com/latest/dex/pairs/bsc/0x813f732fd927f2889ddd5d66103063c0166d9a0c");
    let data = await res.json();

    document.getElementById("price").innerText = "$" + data.pair.priceUsd;
    document.getElementById("volume").innerText = "$" + data.pair.volume.h24;
  } catch (e) {
    document.getElementById("price").innerText = "N/A";
    document.getElementById("volume").innerText = "N/A";
  }
}

loadData();
setInterval(loadData, 10000);
</script>

</body>
</html>
