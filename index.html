<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pralmyx (PMA)</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>
body {PRALMYX LOGO.png
  margin:0;
  font-family:Arial;
  color:white;
  background:linear-gradient(-45deg,#0b0b0f,#1a0f1f,#0b0b0f);
  background-size:400% 400%;
  animation:bg 10s infinite;
}

@keyframes bg {
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

header {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
}

.logo { width:60px; }

.hero {
  text-align:center;
  padding:80px 20px;
}

.hero h1 {
  font-size:50px;
  color:#ff4df0;
  text-shadow:0 0 20px #ff4df0;
}

.btn {
  background:#ff4df0;
  padding:15px 25px;
  border-radius:10px;
  text-decoration:none;
  color:white;
  margin:10px;
  cursor:pointer;
  border:none;
}

.stats {
  display:flex;
  justify-content:center;
  gap:20px;
  margin:20px;
}

.stat {
  background:#15151d;
  padding:15px;
  border-radius:10px;
}

.section {
  max-width:900px;
  margin:auto;
  padding:40px 20px;
}

.card {
  background:#15151d;
  padding:20px;
  margin:20px 0;
  border-radius:12px;
}

iframe {
  width:100%;
  height:400px;
  border-radius:15px;
}
</style>
</head>

<body>

<header>
  <img src="logo.png" class="logo">
  <button class="btn" onclick="connectWallet()">Connect Wallet</button>
</header>

<section class="hero">
  <h1>🚀 PRALMYX (PMA)</h1>
  <p>Decentralized token on BNB Chain</p>

  <div class="stats">
    <div class="stat">💰 Price: <span id="price">Loading...</span></div>
    <div class="stat">📊 Volume: <span id="volume">Loading...</span></div>
  </div>

  <button class="btn" onclick="buyToken()">Buy PMA</button>
</section>

<section class="section">

<h2>📈 Live Chart</h2>
<iframe src="https://dexscreener.com/bsc/0x813f732fd927f2889ddd5d66103063c0166d9a0c"></iframe>

<div class="card">
<h2>🔥 About</h2>
<p>Pralmyx (PMA) is a decentralized token focused on liquidity, growth, and community expansion.</p>
</div>

<div class="card">
<h2>🔒 Security</h2>
<p>✔ Liquidity Locked</p>
<p>✔ Verified Contract</p>
</div>

</section>

<script>
let provider;
let signer;

async function connectWallet() {
  if (window.ethereum) {
    provider = new ethers.providers.Web3Provider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = provider.getSigner();
    alert("Wallet connected 🔥");
  } else {
    alert("Install MetaMask");
  }
}

async function buyToken() {
  alert("Redirecting to PancakeSwap...");
  window.open("https://pancakeswap.finance/swap?outputCurrency=0x557aA6EDC2b7808e8304A18c4Cf62B2e56620211");
}

// Precio real
async function loadData() {
  try {
    const res = await fetch("https://api.dexscreener.com/latest/dex/pairs/bsc/0x813f732fd927f2889ddd5d66103063c0166d9a0c");
    const data = await res.json();

    document.getElementById("price").innerText = data.pair.priceUsd + " USD";
    document.getElementById("volume").innerText = "$" + data.pair.volume.h24;
  } catch(e) {
    document.getElementById("price").innerText = "N/A";
    document.getElementById("volume").innerText = "N/A";
  }
}

loadData();
setInterval(loadData, 10000);
</script>

</body>
</html>
